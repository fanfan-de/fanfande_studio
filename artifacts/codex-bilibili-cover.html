<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1920, height=1080, initial-scale=1">
  <title>Codex Bilibili Cover</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 1920px;
      height: 1080px;
      margin: 0;
      overflow: hidden;
      background:
        linear-gradient(rgba(255, 255, 255, 0.13) 1px, transparent 1px) 0 0 / 54px 54px,
        linear-gradient(90deg, rgba(255, 255, 255, 0.13) 1px, transparent 1px) 0 0 / 54px 54px,
        #030407;
      font-family: "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
      letter-spacing: 0;
    }

    .cover {
      position: relative;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      color: #ffffff;
      background:
        radial-gradient(circle at 50% 36%, rgba(255, 255, 255, 0.05), transparent 32%),
        linear-gradient(rgba(255, 255, 255, 0.16) 1px, transparent 1px) 0 0 / 54px 54px,
        linear-gradient(90deg, rgba(255, 255, 255, 0.16) 1px, transparent 1px) 0 0 / 54px 54px,
        linear-gradient(#030407, #030407);
    }

    .cover::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.72;
      background:
        linear-gradient(rgba(255, 255, 255, 0.18) 1px, transparent 1px) 0 0 / 216px 216px,
        linear-gradient(90deg, rgba(255, 255, 255, 0.18) 1px, transparent 1px) 0 0 / 216px 216px;
      transform: none;
    }

    .cover::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent 40%);
      pointer-events: none;
    }

    .slash {
      display: none;
      position: absolute;
      height: 190px;
      border: 8px solid rgba(12, 20, 40, 0.9);
      border-radius: 36px;
      box-shadow: 16px 18px 0 rgba(12, 20, 40, 0.18);
      transform: rotate(-14deg);
    }

    .slash.yellow {
      left: -90px;
      top: 300px;
      width: 680px;
      background: rgba(45, 217, 255, 0.13);
      border-color: rgba(91, 230, 255, 0.34);
      box-shadow: none;
    }

    .slash.white {
      right: -130px;
      bottom: 130px;
      width: 720px;
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.16);
      opacity: 0.8;
      box-shadow: none;
    }

    .slash.green {
      right: 350px;
      top: -48px;
      width: 560px;
      height: 118px;
      background: rgba(84, 108, 255, 0.14);
      border-color: rgba(103, 220, 255, 0.28);
      box-shadow: none;
      transform: rotate(10deg);
    }

    .spark {
      position: absolute;
      width: 176px;
      height: 176px;
      background: #ffe84c;
      clip-path: polygon(50% 0, 60% 32%, 92% 14%, 76% 48%, 100% 58%, 66% 66%, 82% 100%, 50% 78%, 18% 100%, 34% 66%, 0 58%, 24% 48%, 8% 14%, 40% 32%);
      filter: drop-shadow(10px 12px 0 rgba(12, 20, 40, 0.28));
    }

    .spark.one {
      left: 124px;
      bottom: 144px;
      transform: rotate(-12deg);
      display: none;
    }

    .spark.two {
      right: 136px;
      top: 94px;
      width: 136px;
      height: 136px;
      transform: rotate(18deg);
      background: #ffffff;
      display: none;
    }

    .badge {
      position: absolute;
      top: 58px;
      left: 72px;
      display: flex;
      align-items: center;
      gap: 18px;
      height: 82px;
      padding: 0 34px;
      color: #eafaff;
      font-size: 34px;
      font-weight: 900;
      background: rgba(8, 24, 43, 0.82);
      border: 2px solid rgba(116, 232, 255, 0.42);
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28), inset 0 0 28px rgba(72, 210, 255, 0.12);
      transform: none;
      z-index: 4;
    }

    .badge .dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #00a1d6;
      box-shadow: 34px 0 0 #67e8f9, 68px 0 0 #94a3ff;
    }

    .corner-tag {
      display: none;
    }

    .logo-stage {
      position: absolute;
      top: 164px;
      left: 50%;
      display: flex;
      align-items: center;
      gap: 54px;
      transform: translateX(-50%);
      z-index: 3;
    }

    .logo-card {
      position: relative;
      width: 372px;
      height: 372px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.96);
      border: 6px solid rgba(126, 231, 255, 0.55);
      border-radius: 58px;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.38), 0 0 70px rgba(55, 220, 255, 0.18);
    }

    .logo-card.left {
      transform: rotate(-5deg);
    }

    .logo-card.right {
      transform: rotate(4deg);
    }

    .logo-card::after {
      content: attr(data-label);
      position: absolute;
      left: 50%;
      bottom: -58px;
      min-width: 240px;
      padding: 10px 24px 12px;
      color: #eafaff;
      text-align: center;
      font-size: 34px;
      font-weight: 900;
      line-height: 1;
      background: rgba(7, 17, 31, 0.9);
      border: 2px solid rgba(117, 232, 255, 0.55);
      border-radius: 18px;
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.32);
      transform: translateX(-50%);
      white-space: nowrap;
    }

    .codex-icon {
      width: 246px;
      height: 246px;
      filter: drop-shadow(0 18px 22px rgba(50, 71, 180, 0.24));
    }

    .product-logo {
      width: 244px;
      height: 244px;
      object-fit: contain;
      filter: drop-shadow(0 14px 18px rgba(6, 20, 40, 0.18));
    }

    .plus {
      width: 152px;
      height: 152px;
      display: grid;
      place-items: center;
      color: #061428;
      font-size: 78px;
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
      background: linear-gradient(135deg, #eafaff, #67e8f9);
      border: 6px solid #061428;
      border-radius: 50%;
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.34), 0 0 48px rgba(55, 220, 255, 0.25);
      transform: none;
    }

    .title-wrap {
      position: absolute;
      left: 98px;
      right: 98px;
      bottom: 104px;
      z-index: 5;
    }

    .title {
      margin: 0;
      color: #f8fbff;
      font-size: 128px;
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: 0;
      text-align: center;
      -webkit-text-stroke: 10px #061428;
      paint-order: stroke fill;
      text-shadow:
        0 12px 0 rgba(0, 196, 255, 0.42),
        0 24px 34px rgba(0, 0, 0, 0.56);
    }

    .title .pink {
      color: #f8fbff;
      text-shadow:
        0 12px 0 rgba(0, 196, 255, 0.42),
        0 24px 34px rgba(0, 0, 0, 0.56);
    }

    .ribbon {
      position: absolute;
      display: none;
    }

    .ribbon strong {
      color: #fb7299;
    }

    .outline-burst {
      position: absolute;
      left: 260px;
      top: 170px;
      width: 1420px;
      height: 470px;
      border: 2px solid rgba(118, 232, 255, 0.32);
      border-radius: 68px;
      transform: none;
      z-index: 1;
      box-shadow: inset 0 0 80px rgba(74, 218, 255, 0.1), 0 0 80px rgba(34, 211, 238, 0.08);
    }
  </style>
</head>
<body>
  <main class="cover" aria-label="Bilibili video cover">
    <div class="slash yellow"></div>
    <div class="slash white"></div>
    <div class="slash green"></div>
    <div class="spark one"></div>
    <div class="spark two"></div>
    <div class="outline-burst"></div>

    <section class="logo-stage" aria-label="logos">
      <div class="logo-card left" data-label="Codex">
        <svg class="codex-icon" viewBox="0 0 256 256" role="img" aria-label="Codex logo">
          <path
            d="M106 62c-18 0-31 12-34 29-15 4-26 17-26 33 0 17 12 31 29 34 5 18 21 31 40 31 8 0 16-2 23-6 8 6 18 10 29 10 19 0 35-12 42-29 18-6 30-22 30-42 0-22-17-41-39-44-7-17-23-28-42-28-12 0-24 5-32 14-6-2-13-2-20-2Z"
            fill="none"
            stroke="#07090d"
            stroke-width="15"
            stroke-linejoin="round"
            stroke-linecap="round"
          />
          <path
            d="M93 111l22 17-22 17"
            fill="none"
            stroke="#07090d"
            stroke-width="13"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M133 145h34"
            fill="none"
            stroke="#07090d"
            stroke-width="13"
            stroke-linecap="round"
          />
        </svg>
      </div>

      <div class="plus">-&gt;</div>

      <div class="logo-card right" data-label="Anybox">
        <img class="product-logo" src="../packages/desktop/src/renderer/public/黑色.svg" alt="Product logo">
      </div>
    </section>

    <section class="title-wrap">
      <h1 class="title">我用codex制作<br><span class="pink">开源版本codex</span></h1>
    </section>
  </main>
</body>
</html>
