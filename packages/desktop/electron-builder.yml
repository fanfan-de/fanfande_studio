appId: com.anybox.app
productName: Anybox
artifactName: Anybox-${version}-${arch}.${ext}
asar: true
electronUpdaterCompatibility: ">=2.16"
afterPack: ./scripts/after-pack-icon.cjs
publish:
  provider: github
  owner: fanfan-de
  repo: anybox
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
extraResources:
  - from: build/agent-runtime
    to: agent
    filter:
      - "**/*"
  - from: ../monitor/dist
    to: monitor
    filter:
      - "**/*"
mac:
  icon: build/icon.icns
win:
  icon: build/icon.ico
  signAndEditExecutable: false
  signExts: []
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/installerIcon.ico
  installerHeaderIcon: build/installerIcon.ico
  uninstallerIcon: build/installerIcon.ico
